# @role workflow
# @owns pull-request and branch validation for Cloudflare Pages build health and repo-context generation
# @not-owns production deployment, runtime behavior, or branch protection settings
# @notes Validates the static Cloudflare Pages build and repomix context generation.

name: CI

on:
  pull_request:
  push:
    branches-ignore:
      - main
    paths-ignore:
      - repo-context.xml
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build static app for Cloudflare Pages
        run: npm run build
        env:
          BASE_PATH: ""

      - name: Validate repo context generation
        run: npx --yes repomix --config repomix.config.json